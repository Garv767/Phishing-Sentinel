<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap');
    
    body { 
      width: 320px; 
      background: #050505; 
      color: #ffffff; 
      font-family: 'DM Sans', sans-serif; 
      margin: 0; 
      padding: 0;
      border: 1px solid #222;
    }
    .container {
      padding: 16px;
    }
    .header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      border-bottom: 1px solid #222; 
      padding: 16px; 
    }
    .brand {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-icon {
      width: 12px;
      height: 12px;
      background: white;
    }
    .status { 
      font-size: 9px; 
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: #222; 
      padding: 4px 8px; 
      border: 1px solid #444;
      transition: all 0.3s;
    }
    .stat-row { 
      display: flex;
      border-bottom: 1px solid #222;
    }
    .stat-card { 
      flex: 1;
      padding: 16px; 
      border-right: 1px solid #222;
    }
    .stat-card:last-child {
      border-right: none;
    }
    .stat-label { 
      font-size: 10px; 
      color: #888; 
      text-transform: uppercase; 
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .stat-value { 
      font-size: 24px; 
      font-weight: 900; 
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
    }
    .action-btn {
      display: block;
      width: 100%;
      background: transparent;
      color: white;
      border: 2px solid white;
      padding: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      cursor: pointer;
      box-sizing: border-box;
      transition: all 0.2s;
      text-decoration: none;
    }
    .action-btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="brand-icon"></div>
      Sentinel
    </div>
    <span class="status" id="conn-status">SYNCING</span>
  </div>
  
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-label">Scanned</div>
      <div class="stat-value" id="scanned-count">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Trust</div>
      <div class="stat-value" id="trust-score">--%</div>
    </div>
  </div>

  <div class="container">
    <a href="#" id="launch-dashboard" class="action-btn">Launch Dashboard</a>
  </div>

  <script src="index.js"></script>
</body>
</html>
